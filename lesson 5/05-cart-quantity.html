<!DOCTYPE html>
<html>
  <head>
    <title>Cart Quantity</title>
  </head>
  <body>
    <button onclick="console.log(`Cart Quantity: ${quantity}`);">
      Show Quantity 
    </button>
    <button onclick="++quantity > 10? (alert('The cart is full'), quantity = 10, console.log(`Cart Quantity: ${quantity}`)) : console.log(`Cart Quantity: ${quantity}`);">
      Add to Cart
    </button>
    <button onclick="(quantity += 2) > 10? (alert('The cart is full'), quantity = 10, console.log(`Cart Quantity: ${quantity}`)) : console.log(`Cart Quantity: ${quantity}`);">
      +2
    </button>
    <button onclick="(quantity += 3) > 10? (alert('The cart is full'), quantity = 10, console.log(`Cart Quantity: ${quantity}`)) : console.log(`Cart Quantity: ${quantity}`);">
      +3
    </button>
    <button onclick="console.log(`Cart was reset.`);
                     console.log(`Cart Quantity: ${quantity=0}`);">
      Reset Cart
    </button>
    <!-- <button onclick="console.log(`Cart Quantity: ${quantity+=4}`);">
      +4
    </button>
    <button onclick="console.log(`Cart Quantity: ${quantity+=5}`);">
      +5
    </button> -->
    <button onclick="(quantity -= 1) < 0? (alert('Not enough items in the cart'), quantity = 0, console.log(`Cart Quantity: ${quantity}`)) : console.log(`Cart Quantity: ${quantity}`);">
      Remove from Cart
    </button>
    <button onclick="(quantity -= 2) < 0? (alert('Not enough items in the cart'), quantity = 0, console.log(`Cart Quantity: ${quantity}`)) : console.log(`Cart Quantity: ${quantity}`);">
      -2
    </button>
    <button onclick="(quantity -= 3) < 0? (alert('Not enough items in the cart'), quantity = 0, console.log(`Cart Quantity: ${quantity}`)) : console.log(`Cart Quantity: ${quantity}`);">
      -3
    </button>



    <script>
      let quantity = 0;
      
    </script>

  </body>
</html>
