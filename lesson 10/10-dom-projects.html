<!DOCTYPE html>
<html>
  <head>
    <title>DOM Projects</title>
  </head>

  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
    }
    
    .subscribe-button{
      font-weight: bold;
      color: white;
      background-color: black;
      border: none;
      padding: 10px 15px;
      border-radius: 20px;
      cursor: pointer;
      margin-bottom: 30px;
    }

    .is-subscribed{
      color: black;
      background-color: rgb(240, 240, 240);
    }

    .cost-input{
      padding: 10px 10px;
      width: 170px;
      font-size: 15px
    }

    .calculate-button{
      font-size: 15px;
      padding: 11px 15px;
      color: white;
      background-color: green;
      border: none;
      cursor: pointer;
    }

    
  </style>
  <body>
    <p>Youtube Subscribe Button</p>
    <button onclick="
       subscribe();
    " class="js-subscribe-button subscribe-button">
      Subscribe
    </button>

    <p>Amazon Shipping Calculator</p>
    <p>Orders under $40 = +$10 shipping.</p>
    <p>Orders over $40 = FREE shipping.</p>

    <input class="js-cost-input cost-input" 
      type="number" 
      placeholder="Cost of order"
      onkeydown="handleCostkeydown(event)" >

    <button onclick="calculateTotal()"
            class="calculate-button">
      Calculate
    </button>
    <p class="js-total-cost"></p>

    <script>
    function handleCostkeydown(event){
      if(event.key === 'Enter'){
        calculateTotal();
      }
    }
    
    function calculateTotal(){
      const inputElement = document.querySelector('.js-cost-input');
      let cost = Number(inputElement.value);

      if (cost < 0){
        document.querySelector('.js-total-cost').innerHTML = `Invalid Input`;
      } else if(cost < 40){
          cost = (cost * 100 + 1000)/100;
          document.querySelector('.js-total-cost').innerHTML = `$${cost}`;
      } else{
          cost += 0;
          document.querySelector('.js-total-cost').innerHTML = `$${cost}`;
      }
    }

    function subscribe(){
      const buttonElement = document.querySelector('.js-subscribe-button');
      if(buttonElement.innerText === 'Subscribe') {
        buttonElement.innerText = 'Subscribed';
        buttonElement.classList.add('is-subscribed');
      } else {
        buttonElement.innerText = 'Subscribe';
        buttonElement.classList.remove('is-subscribed');
      }
    }
    </script>
  </body>
</html>
