      // sum of numbers in an array using a loop
      const nums = [1, 2, 3, 4, 5];
      let total = 0;
      for (let i = 0; i < nums.length; i++){
        total += nums[i];
      }
      console.log(total);

      // double the numbers in an array using a loop
      const numsDouble = [];
      for (let i = 0; i < nums.length; i++){
        numsDouble.push(nums[i] * 2);
      }
      console.log(numsDouble);

      // remove the first element of an array using splice
      console.log(numsDouble.splice(0 , 0 , 0));
